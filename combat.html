<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AD&D 2e - Combat Notes</title>
    <style>
        :root { --parchment: #f4e4bc; --parchment-dark: #e6d2a0; --ink: #2b2b2b; --border: #5c4033; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Georgia, serif; background: var(--parchment); color: var(--ink); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        nav { background: var(--border); padding: 8px 15px; display: flex; gap: 15px; flex-wrap: wrap; }
        nav a { color: var(--parchment); text-decoration: none; font-size: 0.85rem; padding: 3px 8px; border: 1px solid transparent; }
        nav a:hover, nav a.current { border-color: var(--parchment); background: rgba(255,255,255,0.12); }
        header { height: 50px; background: var(--border); color: var(--parchment); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        h1 { margin: 0; font-size: 1.2rem; }
        #content { flex: 1; padding: 15px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .note-panel { border: 2px solid var(--border); padding: 10px; background: rgba(255,255,255,0.3); }
        .note-panel h3 { margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        textarea { width: 100%; height: 300px; resize: vertical; font-family: inherit; padding: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.5); }
        .tracker { margin-top: 10px; }
        .tracker-row { display: flex; justify-content: space-between; align-items: center; margin: 5px 0; }
        .tracker-row input { width: 60px; }
    </style>
</head>
<body>
<nav><a href="index.html">Character</a><a href="races.html">Races</a><a href="classes.html">Classes</a><a href="wizardSpells.html">Wizard Spells</a><a href="clericSpells.html">Cleric Spells</a><a href="weapons.html">Weapons</a><a href="armour.html">Armour</a><a href="items.html">Items</a><a href="combat.html" class="current">Combat</a><a href="crafting.html">Crafting</a><a href="campaign.html">Campaign</a></nav>
<header><h1>Combat Tracker</h1><div><button onclick="saveNotes()">Save</button><button onclick="loadFromStore()">Load</button><button onclick="refreshPage()">Refresh</button></div></header>
<div id="content">
    <div class="note-panel">
        <h3>Encounter Notes</h3>
        <textarea id="enc-notes" placeholder="Track initiative, enemy positions, etc."></textarea>
        <div class="tracker">
            <strong>Round Tracker</strong>
            <div class="tracker-row"><label>Current Round:</label><input type="number" id="round-num" value="1" min="1"></div>
        </div>
    </div>
    <div class="note-panel">
        <h3>Damage Log</h3>
        <textarea id="dmg-log" placeholder="Track damage dealt and received..."></textarea>
        <div class="tracker">
            <strong>Quick Rolls</strong>
            <div class="tracker-row"><button onclick="rollInit()">Roll Initiative (d6)</button><span id="init-result">-</span></div>
        </div>
    </div>
</div>
<script>
function load(){
    const s=localStorage.getItem('combatNotes');
    if(!s) return;
    try{
        const d=JSON.parse(s);
        document.getElementById('enc-notes').value=d.enc||'';
        document.getElementById('dmg-log').value=d.dmg||'';
        document.getElementById('round-num').value=d.round||1;
    }catch(e){
        console.error('Invalid cached combat notes, clearing cache:',e);
        localStorage.removeItem('combatNotes');
    }
}
function saveNotes(){const d={enc:document.getElementById('enc-notes').value,dmg:document.getElementById('dmg-log').value,round:document.getElementById('round-num').value};localStorage.setItem('combatNotes',JSON.stringify(d));alert('Combat notes saved!');}
function rollInit(){const r=Math.floor(Math.random()*6)+1;document.getElementById('init-result').textContent='d6 = '+r;}
function loadFromStore(){load();alert('Combat notes loaded from browser cache.');}
function refreshPage(){location.reload();}
load();
</script>
</body>
</html>
