<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AD&D 2e - Armour</title>
    <style>
        :root { --parchment: #f4e4bc; --parchment-dark: #e6d2a0; --ink: #2b2b2b; --border: #5c4033; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Georgia, serif; background: var(--parchment); color: var(--ink); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        nav { background: var(--border); padding: 8px 15px; display: flex; gap: 15px; flex-wrap: wrap; }
        nav a { color: var(--parchment); text-decoration: none; font-size: 0.85rem; padding: 3px 8px; border: 1px solid transparent; }
        nav a:hover, nav a.current { border-color: var(--parchment); background: rgba(255,255,255,0.12); }
        header { height: 50px; background: var(--border); color: var(--parchment); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        h1 { margin: 0; font-size: 1.2rem; }
        button { background: var(--parchment-dark); border: 2px solid var(--ink); color: var(--ink); padding: 5px 12px; cursor: pointer; font-weight: bold; }
        button.danger { background: #d9534f; color: white; }
        #content { flex: 1; padding: 15px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th, td { border: 1px solid var(--border); padding: 6px; text-align: left; }
        th { background: var(--parchment-dark); position: sticky; top: 0; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--parchment); border: 4px double var(--border); padding: 20px; width: 450px; max-height: 85vh; overflow-y: auto; }
        .form-group { margin: 10px 0; }
        .form-group label { font-size: 0.7rem; font-weight: bold; display: block; }
        .form-group input, .form-group select { width: 100%; padding: 5px; border: 1px solid var(--border); }
        .close-btn { float: right; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>
<nav><a href="index.html">Character</a><a href="races.html">Races</a><a href="classes.html">Classes</a><a href="wizardSpells.html">Wizard Spells</a><a href="clericSpells.html">Cleric Spells</a><a href="weapons.html">Weapons</a><a href="armour.html" class="current">Armour</a><a href="items.html">Items</a><a href="proficiencies.html">Proficiencies</a><a href="combat.html">Combat</a><a href="crafting.html">Crafting</a><a href="campaign.html">Campaign</a></nav>
<header><h1>Armour & Shields Database</h1><div><button onclick="saveLocal()">Save</button><button onclick="loadLocal()">Load</button><button onclick="refreshDefaults()">Refresh</button><button onclick="openModal()">+ Add Armour</button></div></header>
<div id="content"><table><thead><tr><th>Name</th><th>Base AC</th><th>Weight</th><th>Cost</th><th>Category</th><th>Shield?</th><th>Actions</th></tr></thead><tbody id="arm-table"></tbody></table></div>
<div id="modal" class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-content"><span class="close-btn" onclick="closeModal()">&times;</span><h2 id="modal-title">Add Armour</h2><input type="hidden" id="edit-idx"><div class="form-group"><label>Name</label><input type="text" id="inp-name"></div><div class="form-group"><label>Base AC (THAC0 style, e.g. 5 for AC 5)</label><input type="number" id="inp-ac"></div><div class="form-group"><label>Max Dex Bonus</label><input type="text" id="inp-dex" placeholder="unlimited or number"></div><div class="form-group"><label>Weight (lbs)</label><input type="number" id="inp-weight"></div><div class="form-group"><label>Cost (GP)</label><input type="number" id="inp-cost"></div><div class="form-group"><label>Category</label><select id="inp-cat"><option>Leather</option><option>Chain</option><option>Plate</option><option>Shield</option></select></div><div class="form-group"><label>Is Shield?</label><select id="inp-shield"><option value="false">No</option><option value="true">Yes</option></select></div><button onclick="saveArm()">Save</button></div></div>
<script>
const CORE_DATA = [
    {name:"Leather Armor",baseAC:8,maxDexBonus:null,weight:15,costGP:5,category:"Leather",isShield:false},
    {name:"Chainmail",baseAC:5,maxDexBonus:null,weight:40,costGP:75,category:"Chain",isShield:false},
    {name:"Plate Mail",baseAC:3,maxDexBonus:null,weight:70,costGP:400,category:"Plate",isShield:false},
    {name:"Medium Shield",baseAC:1,maxDexBonus:null,weight:10,costGP:10,category:"Shield",isShield:true}
];

let data=[]; const DB='armourDB', PATH='data/armour.json';
async function load(){
    const s=localStorage.getItem(DB);
    if(s){
        try{
            const parsed=JSON.parse(s);
            if(Array.isArray(parsed)&&parsed.length>0){data=parsed;render();return;}
        }catch(e){console.error('Invalid cached armour data, reloading from file:',e);localStorage.removeItem(DB);}
    }
    try{
        const r=await fetch(PATH);
        if(!r.ok) throw new Error(`HTTP ${r.status} loading ${PATH}`);
        const loaded=await r.json();
        data=Array.isArray(loaded)?loaded:[];
        localStorage.setItem(DB,JSON.stringify(data));
    }catch(e){console.error('Failed to load armour data:',e);data=CORE_DATA.map(a=>({...a}));}
    render();
}
function render(){document.getElementById('arm-table').innerHTML=data.map((a,i)=>`<tr><td>${a.name}</td><td>${a.baseAC}</td><td>${a.weight}</td><td>${a.costGP}</td><td>${a.category}</td><td>${a.isShield?'Yes':'No'}</td><td><button onclick="edit(${i})">Edit</button><button class="danger" onclick="del(${i})">Del</button></td></tr>`).join('');}
function openModal(){document.getElementById('modal').style.display='flex';clearForm();}
function closeModal(){document.getElementById('modal').style.display='none';}
function clearForm(){document.getElementById('edit-idx').value='';['name','ac','dex','weight','cost','cat','shield'].forEach(id=>{const el=document.getElementById('inp-'+id);if(el)el.value='';});}
function edit(i){const a=data[i];document.getElementById('edit-idx').value=i;document.getElementById('inp-name').value=a.name;document.getElementById('inp-ac').value=a.baseAC;document.getElementById('inp-dex').value=a.maxDexBonus||'';document.getElementById('inp-weight').value=a.weight;document.getElementById('inp-cost').value=a.costGP;document.getElementById('inp-cat').value=a.category;document.getElementById('inp-shield').value=a.isShield?'true':'false';document.getElementById('modal').style.display='flex';}
function saveArm(){const idx=document.getElementById('edit-idx').value;const e={name:document.getElementById('inp-name').value,baseAC:+document.getElementById('inp-ac').value,maxDexBonus:document.getElementById('inp-dex').value||null,weight:+document.getElementById('inp-weight').value,costGP:+document.getElementById('inp-cost').value,category:document.getElementById('inp-cat').value,isShield:document.getElementById('inp-shield').value==='true'};if(idx==='')data.push(e);else data[idx]=e;localStorage.setItem(DB,JSON.stringify(data));closeModal();render();}
function del(i){if(confirm('Delete?')){data.splice(i,1);localStorage.setItem(DB,JSON.stringify(data));render();}}
function saveLocal(){localStorage.setItem(DB,JSON.stringify(data));alert('Armour saved to browser cache.');}
function loadLocal(){const s=localStorage.getItem(DB);if(!s){alert('No local armour cache found.');return;}try{const parsed=JSON.parse(s);data=Array.isArray(parsed)?parsed:[];render();alert('Armour loaded from browser cache.');}catch(e){console.error('Invalid local armour cache:',e);alert('Local armour cache is invalid.');}}
async function refreshDefaults(){try{const r=await fetch(PATH);if(!r.ok) throw new Error(`HTTP ${r.status} loading ${PATH}`);const loaded=await r.json();data=Array.isArray(loaded)?loaded:[];localStorage.setItem(DB,JSON.stringify(data));render();alert('Armour refreshed from defaults.');}catch(e){console.error('Failed to refresh armour defaults:',e);data=CORE_DATA.map(a=>({...a}));render();alert('Fetch failed; showing built-in core armour entries. Start server with setup.bat/setup.sh to load full data.');}}
load();
</script>
</body>
</html>
