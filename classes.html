<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AD&D 2e - Classes Database</title>
    <style>
        :root { --parchment: #f4e4bc; --parchment-dark: #e6d2a0; --ink: #2b2b2b; --border: #5c4033; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Georgia, serif; background: var(--parchment); color: var(--ink); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        nav { background: var(--border); padding: 8px 15px; display: flex; gap: 15px; flex-wrap: wrap; }
        nav a { color: var(--parchment); text-decoration: none; font-size: 0.85rem; padding: 3px 8px; border: 1px solid transparent; }
        nav a:hover, nav a.current { border-color: var(--parchment); background: rgba(255,255,255,0.12); }
        header { height: 50px; background: var(--border); color: var(--parchment); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        h1 { margin: 0; font-size: 1.2rem; }
        button { background: var(--parchment-dark); border: 2px solid var(--ink); color: var(--ink); padding: 5px 12px; cursor: pointer; font-weight: bold; }
        button.danger { background: #d9534f; color: white; }
        button:disabled { opacity: 0.45; cursor: not-allowed; }
        #content { flex: 1; padding: 15px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th, td { border: 1px solid var(--border); padding: 6px; text-align: left; vertical-align: top; }
        th { background: var(--parchment-dark); position: sticky; top: 0; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 12px; }
        .modal-content { background: var(--parchment); border: 4px double var(--border); padding: 16px; width: 1100px; max-width: 98vw; max-height: 92vh; overflow-y: auto; }
        .close-btn { float: right; font-size: 1.5rem; cursor: pointer; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .save-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
        .thief-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
        .section { margin-top: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.25); padding: 10px; }
        .section h3 { margin: 0 0 8px; font-size: 0.85rem; text-transform: uppercase; }
        .form-group { margin: 10px 0; }
        .form-group label { font-size: 0.7rem; font-weight: bold; display: block; }
        .form-group input, .form-group textarea { width: 100%; padding: 5px; border: 1px solid var(--border); }
        .tiny { font-size: 0.72rem; }
        .action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .trait-list, .kit-list { display: flex; flex-direction: column; gap: 8px; }
        .trait-row, .kit-card { border: 1px solid var(--border); background: rgba(255,255,255,0.45); padding: 8px; }
        .trait-row { display: grid; grid-template-columns: 120px 1fr 120px 100px 1fr auto; gap: 8px; align-items: start; }
        .trait-row textarea { min-height: 54px; }
        .kit-card { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: start; }
        .kit-summary { font-size: 0.75rem; margin-top: 4px; }
        .modal-overlay.nested { z-index: 1100; }
    </style>
</head>
<body>
<nav><a href="index.html">Character</a><a href="races.html">Races</a><a href="classes.html" class="current">Classes</a><a href="wizardSpells.html">Wizard Spells</a><a href="clericSpells.html">Cleric Spells</a><a href="weapons.html">Weapons</a><a href="armour.html">Armour</a><a href="items.html">Items</a><a href="itemMechanics.html">Item Mechanics</a><a href="proficiencies.html">Proficiencies</a><a href="combat.html">Combat</a><a href="crafting.html">Crafting</a><a href="campaign.html">Campaign</a><a href="admin.html">Admin</a></nav>
<header><h1>Classes & Kits Database</h1><div><button onclick="saveLocal()">Save</button><button onclick="loadLocal()">Load</button><button onclick="refreshDefaults()">Refresh</button><button onclick="openModal()">+ Add Class</button></div></header>
<div id="content"><table><thead><tr><th>Class</th><th>Kits</th><th>Class Traits</th><th>Kit Traits</th><th>THAC0</th><th>Saves</th><th>Spell Rows</th><th>Turn</th><th>Thief</th><th>Weapon Groups</th><th>Kit 0 Note</th><th>Actions</th></tr></thead><tbody id="class-table"></tbody></table></div>

<div id="modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <h2 id="modal-title">Add Class</h2>
    <input type="hidden" id="edit-idx">
    <div class="grid-2">
      <div class="form-group"><label>Name</label><input type="text" id="inp-name"></div>
      <div class="form-group"><label>Starting Gold</label><input type="text" id="inp-gold"></div>
      <div class="form-group"><label>Allowed Armour</label><input type="text" id="inp-armour"></div>
      <div class="form-group"><label>Weapon Groups</label><input type="text" id="inp-weapon-groups" placeholder="all, bludgeoning"></div>
    </div>

    <div class="section">
      <h3>Class Tables</h3>
      <div class="grid-2">
        <div class="form-group"><label>THAC0</label><input type="text" id="inp-thac0" placeholder="20, 19, 18, ..."></div>
        <div class="form-group"><label>Spell Slots</label><textarea id="inp-spell-slots" rows="3" placeholder="1 | 2,1 | 2,2"></textarea></div>
      </div>
      <div class="grid-2">
        <div class="form-group"><label>Weapon Proficiencies</label><input type="text" id="inp-weapon-profs" placeholder="1, 1, 1, ..."></div>
        <div class="form-group"><label>Nonweapon Proficiencies</label><input type="text" id="inp-nonweapon-profs" placeholder="3, 3, 3, ..."></div>
      </div>
      <div class="grid-2">
        <div class="form-group"><label>Turn Undead</label><input type="text" id="inp-turn-table" placeholder="-, -, T, T, D, ..."></div>
        <div class="form-group"><label>Class Traits</label><div id="class-traits-list" class="trait-list"></div><div class="action-row"><button type="button" onclick="addClassTraitRow()">+ Add Trait</button></div></div>
      </div>
    </div>

    <div class="section">
      <h3>Saves</h3>
      <div class="save-grid">
        <div class="form-group"><label>Paralyze / Poison / Death</label><input type="text" id="inp-save-ppd"></div>
        <div class="form-group"><label>Rod / Staff / Wand</label><input type="text" id="inp-save-rsw"></div>
        <div class="form-group"><label>Petrification / Polymorph</label><input type="text" id="inp-save-pp"></div>
        <div class="form-group"><label>Breath Weapon</label><input type="text" id="inp-save-bw"></div>
        <div class="form-group"><label>Spell</label><input type="text" id="inp-save-spell"></div>
      </div>
    </div>

    <div class="section">
      <h3>Thief Base</h3>
      <div class="thief-grid">
        <div class="form-group"><label>PP</label><input type="text" id="inp-thief-pp"></div>
        <div class="form-group"><label>OL</label><input type="text" id="inp-thief-ol"></div>
        <div class="form-group"><label>FRT</label><input type="text" id="inp-thief-frt"></div>
        <div class="form-group"><label>MS</label><input type="text" id="inp-thief-ms"></div>
        <div class="form-group"><label>HS</label><input type="text" id="inp-thief-hs"></div>
        <div class="form-group"><label>DN</label><input type="text" id="inp-thief-dn"></div>
        <div class="form-group"><label>CW</label><input type="text" id="inp-thief-cw"></div>
        <div class="form-group"><label>RL</label><input type="text" id="inp-thief-rl"></div>
      </div>
    </div>

    <div class="section">
      <h3>Kits</h3>
      <div id="kits-list" class="kit-list"></div>
      <div class="action-row"><button type="button" onclick="addKit()">+ Add Kit</button></div>
    </div>

    <div class="action-row">
      <button onclick="saveClass()">Save</button>
      <button class="danger" id="del-btn" onclick="modalDel()" style="display:none">Delete</button>
    </div>
  </div>
</div>

<div id="kit-modal" class="modal-overlay nested" onclick="if(event.target===this)closeKitModal()">
  <div class="modal-content">
    <span class="close-btn" onclick="closeKitModal()">&times;</span>
    <h2 id="kit-modal-title">Kit</h2>
    <input type="hidden" id="kit-edit-idx">
    <div class="grid-2">
      <div class="form-group"><label>Name</label><input type="text" id="kit-name"></div>
      <div class="form-group"><label>Note</label><input type="text" id="kit-note"></div>
      <div class="form-group"><label>Benefits</label><textarea id="kit-benefits" rows="4"></textarea></div>
      <div class="form-group"><label>Restrictions</label><textarea id="kit-restrictions" rows="4"></textarea></div>
      <div class="form-group"><label>Special Abilities</label><textarea id="kit-special" rows="4"></textarea></div>
      <div class="form-group"><label>Kit Traits</label><div id="kit-traits-list" class="trait-list"></div><div class="action-row"><button type="button" onclick="addKitTraitRow()">+ Add Trait</button></div></div>
    </div>
    <div class="action-row">
      <button onclick="saveKit()">Save Kit</button>
      <button class="danger" id="delete-kit-btn" onclick="deleteKit()">Delete Kit</button>
      <button onclick="closeKitModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const DB = 'classesDB';
const PATH = 'data/classes.json';
const DEFAULT_KIT = { name: 'Kit 0', parentClass: '', benefits: 'No effect.', restrictions: 'None.', specialAbilities: 'None.', note: 'Default fallback kit; no mechanical effects.', kitTraits: [] };

let data = [];
let currentClassTraits = [];
let currentKits = [];

function escapeHtml(v) { return String(v ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function numListToText(list) { return Array.isArray(list) ? list.join(', ') : ''; }
function textListToArray(text) { return String(text || '').split(/[,;|]+/).map(v => v.trim()).filter(Boolean); }
function numTextToArray(text) { return String(text || '').split(/[,;|]+/).map(v => parseInt(v.trim(), 10)).filter(v => Number.isFinite(v)); }
function matrixToText(matrix) { return Array.isArray(matrix) ? matrix.map(row => Array.isArray(row) ? row.join(', ') : '').filter(Boolean).join(' | ') : ''; }
function textToMatrix(text) { const raw = String(text || '').trim(); if (!raw) return []; return raw.split('|').map(row => row.split(',').map(v => parseInt(v.trim(), 10)).filter(v => Number.isFinite(v))).filter(row => row.length > 0); }

function normalizeTrait(trait) {
  return { tag: String(trait?.tag || '').trim(), text: String(trait?.text || '').trim(), sourceBook: String(trait?.sourceBook || '').trim(), sourcePage: String(trait?.sourcePage || '').trim(), sourceSnippet: String(trait?.sourceSnippet || '').trim() };
}
function normalizeTraits(traits) { return Array.isArray(traits) ? traits.map(normalizeTrait).filter(t => t.tag || t.text || t.sourceBook || t.sourcePage || t.sourceSnippet) : []; }
function normalizeKit(kit, parentClass) { return { name: String(kit?.name || '').trim(), parentClass: String(kit?.parentClass || parentClass || '').trim(), benefits: String(kit?.benefits || '').trim(), restrictions: String(kit?.restrictions || '').trim(), specialAbilities: String(kit?.specialAbilities || '').trim(), note: String(kit?.note || '').trim(), kitTraits: normalizeTraits(kit?.kitTraits) }; }
function ensureDefaultKitList(kits, parentClass) { const list = Array.isArray(kits) ? kits.filter(Boolean).map(k => normalizeKit(k, parentClass)) : []; if (!list.some(k => k.name === 'Kit 0')) list.unshift(normalizeKit(DEFAULT_KIT, parentClass)); return list; }
function normalizeClassRecord(rec) { const name = String(rec?.name || '').trim(); return { ...rec, name, startingGold: String(rec?.startingGold || ''), allowedArmour: String(rec?.allowedArmour || ''), weaponGroups: Array.isArray(rec?.weaponGroups) ? rec.weaponGroups.map(v => String(v)) : [], thac0: Array.isArray(rec?.thac0) ? rec.thac0 : [], saves: rec?.saves && typeof rec.saves === 'object' && !Array.isArray(rec.saves) ? rec.saves : {}, weaponProficiencies: Array.isArray(rec?.weaponProficiencies) ? rec.weaponProficiencies : [], nonweaponProficiencies: Array.isArray(rec?.nonweaponProficiencies) ? rec.nonweaponProficiencies : [], spellSlots: Array.isArray(rec?.spellSlots) ? rec.spellSlots : [], turnTable: Array.isArray(rec?.turnTable) ? rec.turnTable : null, thiefBase: rec?.thiefBase && typeof rec.thiefBase === 'object' && !Array.isArray(rec.thiefBase) ? rec.thiefBase : null, classTraits: normalizeTraits(rec?.classTraits), kits: ensureDefaultKitList(rec?.kits, name) }; }

function readTraitRows(containerId) { return [...document.querySelectorAll(`#${containerId} .trait-row`)].map(row => ({ tag: row.querySelector('[data-field="tag"]').value, text: row.querySelector('[data-field="text"]').value, sourceBook: row.querySelector('[data-field="sourceBook"]').value, sourcePage: row.querySelector('[data-field="sourcePage"]').value, sourceSnippet: row.querySelector('[data-field="sourceSnippet"]').value })).map(normalizeTrait).filter(t => t.tag || t.text || t.sourceBook || t.sourcePage || t.sourceSnippet); }
function renderTraitRows(containerId, traits) { const container = document.getElementById(containerId); const rows = Array.isArray(traits) ? traits : []; if (rows.length === 0) { container.innerHTML = '<div class="tiny">No traits yet.</div>'; return; } container.innerHTML = rows.map((trait, idx) => `<div class="trait-row"><input data-field="tag" type="text" placeholder="tag" value="${escapeHtml(trait.tag || '')}"><textarea data-field="text" rows="2" placeholder="trait text">${escapeHtml(trait.text || '')}</textarea><input data-field="sourceBook" type="text" placeholder="book" value="${escapeHtml(trait.sourceBook || '')}"><input data-field="sourcePage" type="text" placeholder="page" value="${escapeHtml(trait.sourcePage || '')}"><textarea data-field="sourceSnippet" rows="2" placeholder="source snippet">${escapeHtml(trait.sourceSnippet || '')}</textarea><button type="button" class="danger" onclick="removeTraitRow('${containerId}', ${idx})">Delete</button></div>`).join(''); }
function removeTraitRow(containerId, index) { const traits = readTraitRows(containerId); traits.splice(index, 1); renderTraitRows(containerId, traits); }
function addClassTraitRow() { const traits = readTraitRows('class-traits-list'); traits.push({ tag: '', text: '', sourceBook: '', sourcePage: '', sourceSnippet: '' }); renderTraitRows('class-traits-list', traits); }
function addKitTraitRow() { const traits = readTraitRows('kit-traits-list'); traits.push({ tag: '', text: '', sourceBook: '', sourcePage: '', sourceSnippet: '' }); renderTraitRows('kit-traits-list', traits); }

function render() {
  document.getElementById('class-table').innerHTML = data.map((c, i) => {
    const kits = Array.isArray(c.kits) ? c.kits : [];
    const kit0 = kits.find(k => k && k.name === 'Kit 0');
    return `<tr><td>${escapeHtml(c.name)}</td><td>${kits.length}</td><td>${Array.isArray(c.classTraits) ? c.classTraits.length : 0}</td><td>${kits.reduce((sum, kit) => sum + (Array.isArray(kit?.kitTraits) ? kit.kitTraits.length : 0), 0)}</td><td>${Array.isArray(c.thac0) ? c.thac0.length : 0}</td><td>${Object.keys(c.saves || {}).length}</td><td>${Array.isArray(c.spellSlots) ? c.spellSlots.length : 0}</td><td>${Array.isArray(c.turnTable) ? 'Yes' : '-'}</td><td>${c.thiefBase ? 'Yes' : '-'}</td><td>${escapeHtml(Array.isArray(c.weaponGroups) && c.weaponGroups.length ? c.weaponGroups.join(', ') : '-')}</td><td>${escapeHtml(kit0?.note || '-')}</td><td><button onclick="edit(${i})">Edit</button></td></tr>`;
  }).join('');
}

function openModal() { document.getElementById('modal-title').textContent = 'Add Class'; clearForm(); document.getElementById('modal').style.display = 'flex'; }
function closeModal() { document.getElementById('modal').style.display = 'none'; closeKitModal(); }

function clearForm() {
  document.getElementById('edit-idx').value = '';
  document.getElementById('del-btn').style.display = 'none';
  ['inp-name','inp-gold','inp-armour','inp-weapon-groups','inp-thac0','inp-spell-slots','inp-turn-table','inp-save-ppd','inp-save-rsw','inp-save-pp','inp-save-bw','inp-save-spell','inp-thief-pp','inp-thief-ol','inp-thief-frt','inp-thief-ms','inp-thief-hs','inp-thief-dn','inp-thief-cw','inp-thief-rl'].forEach(id => document.getElementById(id).value = '');
  currentClassTraits = [];
  currentKits = ensureDefaultKitList([], '');
  renderTraitRows('class-traits-list', currentClassTraits);
  renderKitsList();
}

function fillForm(rec) {
  document.getElementById('inp-name').value = rec.name || '';
  document.getElementById('inp-gold').value = rec.startingGold || '';
  document.getElementById('inp-armour').value = rec.allowedArmour || '';
  document.getElementById('inp-weapon-groups').value = Array.isArray(rec.weaponGroups) ? rec.weaponGroups.join(', ') : '';
  document.getElementById('inp-thac0').value = numListToText(rec.thac0 || []);
  document.getElementById('inp-spell-slots').value = matrixToText(rec.spellSlots || []);
  document.getElementById('inp-turn-table').value = Array.isArray(rec.turnTable) ? rec.turnTable.join(', ') : '';
  document.getElementById('inp-save-ppd').value = numListToText(rec.saves?.paralyzePoisonDeath || []);
  document.getElementById('inp-save-rsw').value = numListToText(rec.saves?.rodStaffWand || []);
  document.getElementById('inp-save-pp').value = numListToText(rec.saves?.petrificationPolymorph || []);
  document.getElementById('inp-save-bw').value = numListToText(rec.saves?.breathWeapon || []);
  document.getElementById('inp-save-spell').value = numListToText(rec.saves?.spell || []);
  const thief = rec.thiefBase || {};
  document.getElementById('inp-thief-pp').value = numListToText(thief.pickPockets || []);
  document.getElementById('inp-thief-ol').value = numListToText(thief.openLocks || []);
  document.getElementById('inp-thief-frt').value = numListToText(thief.findTraps || []);
  document.getElementById('inp-thief-ms').value = numListToText(thief.moveSilently || []);
  document.getElementById('inp-thief-hs').value = numListToText(thief.hideShadows || []);
  document.getElementById('inp-thief-dn').value = numListToText(thief.detectNoise || []);
  document.getElementById('inp-thief-cw').value = numListToText(thief.climbWalls || []);
  document.getElementById('inp-thief-rl').value = numListToText(thief.readLanguages || []);
  currentClassTraits = rec.classTraits || [];
  currentKits = ensureDefaultKitList(rec.kits, rec.name);
  renderTraitRows('class-traits-list', currentClassTraits);
  renderKitsList();
}

function edit(i) {
  const rec = normalizeClassRecord(data[i]);
  document.getElementById('modal-title').textContent = `Edit ${rec.name}`;
  document.getElementById('edit-idx').value = i;
  fillForm(rec);
  document.getElementById('del-btn').style.display = 'inline-block';
  document.getElementById('modal').style.display = 'flex';
}

function renderKitsList() {
  const container = document.getElementById('kits-list');
  if (!Array.isArray(currentKits) || currentKits.length === 0) { container.innerHTML = '<div class="tiny">No kits yet.</div>'; return; }
  container.innerHTML = currentKits.map((kit, idx) => `<div class="kit-card"><div><div><strong>${escapeHtml(kit.name || `Kit ${idx + 1}`)}</strong> ${kit.name === 'Kit 0' ? '<span class="tiny">(default)</span>' : ''}</div><div class="kit-summary">${escapeHtml(kit.note || '')} | traits: ${(kit.kitTraits || []).length}</div></div><div style="display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end;"><button type="button" onclick="openKitModal(${idx})">Edit</button><button type="button" class="danger" onclick="deleteKit(${idx})" ${kit.name === 'Kit 0' ? 'disabled' : ''}>Delete</button></div></div>`).join('');
}

function openKitModal(index) {
  const className = document.getElementById('inp-name').value.trim();
  const kit = index >= 0 && currentKits[index] ? normalizeKit(currentKits[index], className) : normalizeKit(DEFAULT_KIT, className);
  document.getElementById('kit-edit-idx').value = index >= 0 ? index : currentKits.length;
  document.getElementById('kit-modal-title').textContent = index >= 0 ? `Edit Kit: ${kit.name}` : 'Add Kit';
  document.getElementById('kit-name').value = kit.name || '';
  document.getElementById('kit-note').value = kit.note || '';
  document.getElementById('kit-benefits').value = kit.benefits || '';
  document.getElementById('kit-restrictions').value = kit.restrictions || '';
  document.getElementById('kit-special').value = kit.specialAbilities || '';
  renderTraitRows('kit-traits-list', kit.kitTraits || []);
  document.getElementById('delete-kit-btn').style.display = kit.name === 'Kit 0' ? 'none' : 'inline-block';
  document.getElementById('kit-modal').style.display = 'flex';
}

function closeKitModal() { document.getElementById('kit-modal').style.display = 'none'; }
function addKit() { openKitModal(-1); }

function saveKit() {
  const idx = parseInt(document.getElementById('kit-edit-idx').value, 10);
  const className = document.getElementById('inp-name').value.trim();
  const kit = normalizeKit({ name: document.getElementById('kit-name').value.trim(), parentClass: className, note: document.getElementById('kit-note').value, benefits: document.getElementById('kit-benefits').value, restrictions: document.getElementById('kit-restrictions').value, specialAbilities: document.getElementById('kit-special').value, kitTraits: readTraitRows('kit-traits-list') }, className);
  if (!kit.name) { alert('Kit name is required.'); return; }
  if (Number.isInteger(idx) && idx >= 0 && idx < currentKits.length) currentKits[idx] = kit; else currentKits.push(kit);
  currentKits = ensureDefaultKitList(currentKits, className);
  renderKitsList();
  closeKitModal();
}

function deleteKit(index) {
  const kit = currentKits[index];
  if (!kit || kit.name === 'Kit 0') return;
  if (!confirm(`Delete kit ${kit.name}?`)) return;
  currentKits.splice(index, 1);
  currentKits = ensureDefaultKitList(currentKits, document.getElementById('inp-name').value.trim());
  renderKitsList();
}

function saveClass() {
  const idx = document.getElementById('edit-idx').value;
  const className = document.getElementById('inp-name').value.trim();
  if (!className) { alert('Class name is required.'); return; }
  const next = normalizeClassRecord({
    name: className,
    startingGold: document.getElementById('inp-gold').value,
    allowedArmour: document.getElementById('inp-armour').value,
    weaponGroups: textListToArray(document.getElementById('inp-weapon-groups').value),
    thac0: numTextToArray(document.getElementById('inp-thac0').value),
    saves: {
      paralyzePoisonDeath: numTextToArray(document.getElementById('inp-save-ppd').value),
      rodStaffWand: numTextToArray(document.getElementById('inp-save-rsw').value),
      petrificationPolymorph: numTextToArray(document.getElementById('inp-save-pp').value),
      breathWeapon: numTextToArray(document.getElementById('inp-save-bw').value),
      spell: numTextToArray(document.getElementById('inp-save-spell').value)
    },
    weaponProficiencies: numTextToArray(document.getElementById('inp-weapon-profs').value),
    nonweaponProficiencies: numTextToArray(document.getElementById('inp-nonweapon-profs').value),
    spellSlots: textToMatrix(document.getElementById('inp-spell-slots').value),
    turnTable: textListToArray(document.getElementById('inp-turn-table').value),
    thiefBase: {
      pickPockets: numTextToArray(document.getElementById('inp-thief-pp').value),
      openLocks: numTextToArray(document.getElementById('inp-thief-ol').value),
      findTraps: numTextToArray(document.getElementById('inp-thief-frt').value),
      moveSilently: numTextToArray(document.getElementById('inp-thief-ms').value),
      hideShadows: numTextToArray(document.getElementById('inp-thief-hs').value),
      detectNoise: numTextToArray(document.getElementById('inp-thief-dn').value),
      climbWalls: numTextToArray(document.getElementById('inp-thief-cw').value),
      readLanguages: numTextToArray(document.getElementById('inp-thief-rl').value)
    },
    classTraits: readTraitRows('class-traits-list'),
    kits: ensureDefaultKitList(currentKits, className)
  });
  if (idx === '') data.push(next); else data[idx] = next;
  localStorage.setItem(DB, JSON.stringify(data));
  closeModal();
  render();
}

function modalDel() {
  const idx = document.getElementById('edit-idx').value;
  if (idx === '') return;
  if (!confirm('Delete this class?')) return;
  data.splice(parseInt(idx, 10), 1);
  localStorage.setItem(DB, JSON.stringify(data));
  closeModal();
  render();
}

function saveLocal() { localStorage.setItem(DB, JSON.stringify(data)); alert('Classes saved to browser cache.'); }
function loadLocal() {
  const raw = localStorage.getItem(DB);
  if (!raw) { alert('No local classes cache found.'); return; }
  try { data = (Array.isArray(JSON.parse(raw)) ? JSON.parse(raw) : []).map(normalizeClassRecord); render(); alert('Classes loaded from browser cache.'); }
  catch (e) { console.error(e); alert('Local classes cache is invalid.'); }
}

async function refreshDefaults() {
  try {
    const r = await fetch(PATH);
    if (!r.ok) throw new Error(`HTTP ${r.status} loading ${PATH}`);
    const loaded = await r.json();
    data = Array.isArray(loaded) ? loaded.map(normalizeClassRecord) : [];
    localStorage.setItem(DB, JSON.stringify(data));
    render();
    alert('Classes refreshed from defaults.');
  } catch (e) {
    console.error('Failed to refresh classes defaults:', e);
    data = [];
    render();
    alert('Fetch failed.');
  }
}

async function load() {
  const raw = localStorage.getItem(DB);
  if (raw) {
    try {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length > 0) { data = parsed.map(normalizeClassRecord); render(); return; }
    } catch (e) {
      console.error('Invalid cached classes data, reloading from file:', e);
      localStorage.removeItem(DB);
    }
  }
  try {
    const r = await fetch(PATH);
    if (!r.ok) throw new Error(`HTTP ${r.status} loading ${PATH}`);
    const loaded = await r.json();
    data = Array.isArray(loaded) ? loaded.map(normalizeClassRecord) : [];
    localStorage.setItem(DB, JSON.stringify(data));
  } catch (e) {
    console.error('Failed to load classes data:', e);
    data = [];
  }
  render();
}

load();
</script>
