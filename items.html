<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AD&D 2e - Items</title>
    <style>
        :root { --parchment: #f4e4bc; --parchment-dark: #e6d2a0; --ink: #2b2b2b; --border: #5c4033; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Georgia, serif; background: var(--parchment); color: var(--ink); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        nav { background: var(--border); padding: 8px 15px; display: flex; gap: 15px; flex-wrap: wrap; }
        nav a { color: var(--parchment); text-decoration: none; font-size: 0.85rem; padding: 3px 8px; border: 1px solid transparent; }
        nav a:hover, nav a.current { border-color: var(--parchment); background: rgba(255,255,255,0.12); }
        header { height: 50px; background: var(--border); color: var(--parchment); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        h1 { margin: 0; font-size: 1.2rem; }
        button { background: var(--parchment-dark); border: 2px solid var(--ink); color: var(--ink); padding: 5px 12px; cursor: pointer; font-weight: bold; }
        button.danger { background: #d9534f; color: white; }
        #content { flex: 1; padding: 15px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th, td { border: 1px solid var(--border); padding: 6px; text-align: left; }
        th { background: var(--parchment-dark); position: sticky; top: 0; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--parchment); border: 4px double var(--border); padding: 20px; width: 450px; max-height: 85vh; overflow-y: auto; }
        .form-group { margin: 10px 0; }
        .form-group label { font-size: 0.7rem; font-weight: bold; display: block; }
        .form-group input, .form-group textarea { width: 100%; padding: 5px; border: 1px solid var(--border); }
        .close-btn { float: right; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>
<nav><a href="index.html">Character</a><a href="races.html">Races</a><a href="classes.html">Classes</a><a href="wizardSpells.html">Wizard Spells</a><a href="clericSpells.html">Cleric Spells</a><a href="weapons.html">Weapons</a><a href="armour.html">Armour</a><a href="items.html" class="current">Items</a><a href="combat.html">Combat</a><a href="crafting.html">Crafting</a><a href="campaign.html">Campaign</a></nav>
<header><h1>Equipment & Treasure Database</h1><div><button onclick="saveLocal()">Save</button><button onclick="loadLocal()">Load</button><button onclick="refreshDefaults()">Refresh</button><button onclick="openModal()">+ Add Item</button></div></header>
<div id="content"><table><thead><tr><th>Name</th><th>Weight</th><th>Cost</th><th>Description</th><th>Actions</th></tr></thead><tbody id="item-table"></tbody></table></div>
<div id="modal" class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-content"><span class="close-btn" onclick="closeModal()">&times;</span><h2 id="modal-title">Add Item</h2><input type="hidden" id="edit-idx"><div class="form-group"><label>Name</label><input type="text" id="inp-name"></div><div class="form-group"><label>Weight (lbs)</label><input type="number" id="inp-weight"></div><div class="form-group"><label>Cost (GP)</label><input type="number" id="inp-cost"></div><div class="form-group"><label>Description</label><textarea id="inp-desc" rows="3"></textarea></div><button onclick="saveItem()">Save</button></div></div>
<script>
let data=[]; const DB='itemsDB', PATH='data/items.json';
async function load(){
    const s=localStorage.getItem(DB);
    if(s){
        try{
            const parsed=JSON.parse(s);
            if(Array.isArray(parsed)&&parsed.length>0){data=parsed;render();return;}
        }catch(e){console.error('Invalid cached items data, reloading from file:',e);localStorage.removeItem(DB);}
    }
    try{
        const r=await fetch(PATH);
        if(!r.ok) throw new Error(`HTTP ${r.status} loading ${PATH}`);
        const loaded=await r.json();
        data=Array.isArray(loaded)?loaded:[];
        localStorage.setItem(DB,JSON.stringify(data));
    }catch(e){console.error('Failed to load items data:',e);data=[];}
    render();
}
function render(){document.getElementById('item-table').innerHTML=data.map((it,i)=>`<tr><td>${it.name}</td><td>${it.weight}</td><td>${it.costGP}</td><td>${(it.description||'').substring(0,40)}...</td><td><button onclick="edit(${i})">Edit</button><button class="danger" onclick="del(${i})">Del</button></td></tr>`).join('');}
function openModal(){document.getElementById('modal').style.display='flex';clearForm();}
function closeModal(){document.getElementById('modal').style.display='none';}
function clearForm(){document.getElementById('edit-idx').value='';['name','weight','cost','desc'].forEach(id=>{const el=document.getElementById('inp-'+id);if(el)el.value='';});}
function edit(i){const it=data[i];document.getElementById('edit-idx').value=i;document.getElementById('inp-name').value=it.name;document.getElementById('inp-weight').value=it.weight;document.getElementById('inp-cost').value=it.costGP;document.getElementById('inp-desc').value=it.description||'';document.getElementById('modal').style.display='flex';}
function saveItem(){const idx=document.getElementById('edit-idx').value;const e={name:document.getElementById('inp-name').value,weight:+document.getElementById('inp-weight').value,costGP:+document.getElementById('inp-cost').value,description:document.getElementById('inp-desc').value};if(idx==='')data.push(e);else data[idx]=e;localStorage.setItem(DB,JSON.stringify(data));closeModal();render();}
function del(i){if(confirm('Delete?')){data.splice(i,1);localStorage.setItem(DB,JSON.stringify(data));render();}}
function saveLocal(){localStorage.setItem(DB,JSON.stringify(data));alert('Items saved to browser cache.');}
function loadLocal(){const s=localStorage.getItem(DB);if(!s){alert('No local items cache found.');return;}try{const parsed=JSON.parse(s);data=Array.isArray(parsed)?parsed:[];render();alert('Items loaded from browser cache.');}catch(e){console.error('Invalid local items cache:',e);alert('Local items cache is invalid.');}}
async function refreshDefaults(){try{const r=await fetch(PATH);if(!r.ok) throw new Error(`HTTP ${r.status} loading ${PATH}`);const loaded=await r.json();data=Array.isArray(loaded)?loaded:[];localStorage.setItem(DB,JSON.stringify(data));render();alert('Items refreshed from defaults.');}catch(e){console.error('Failed to refresh items defaults:',e);alert('Refresh failed. Start server with setup.bat/setup.sh and try again.');}}
load();
</script>
</body>
</html>
